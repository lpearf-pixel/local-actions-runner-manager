name: Self-hosted runner smoke test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [self-hosted, Linux, ARM64, lan]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Host information
        run: |
          uname -a
          id
      - name: Docker access
        run: docker version
      - name: Compose project validation
        run: |
          cp .env.example .env
          sed -i 's/github_pat_replace_me/test-token/' .env
          docker compose config --quiet

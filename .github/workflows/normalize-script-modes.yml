name: Validate and Normalize Manager

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - runnerctl
      - runner/**
      - scripts/**
      - tests/**
      - docs/**
      - Makefile
      - compose.yaml
      - .github/workflows/normalize-script-modes.yml
  push:
    branches:
      - main
    paths:
      - runnerctl
      - runner/**
      - scripts/**
      - tests/**
      - docs/**
      - Makefile
      - compose.yaml
      - .github/workflows/normalize-script-modes.yml

permissions:
  contents: write

jobs:
  shell-syntax:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2, verified from the PR run action resolution.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Validate shell syntax and command interface
        shell: bash
        run: |
          set -Eeuo pipefail

          bash -n runnerctl
          bash runnerctl help >/dev/null
          make help >/dev/null

          while IFS= read -r file; do
            echo "syntax: ${file}"
            bash -n "$file"
          done < <(find scripts tests -type f -name '*.sh' -print | sort)

          for file in runner/create runner/start-instance; do
            if [[ -f "$file" ]]; then
              echo "syntax: ${file}"
              bash -n "$file"
            fi
          done

  regression-tests:
    if: github.actor != 'github-actions[bot]'
    needs: shell-syntax
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - tests/docker-cli-version-contract.test.sh
          - tests/docker-socket-access.test.sh
          - tests/legacy-entrypoints-contract.test.sh
          - tests/no-proxy-contract.test.sh
          - tests/runner-credential-isolation.test.sh
          - tests/runner-restart-idempotency.test.sh
          - tests/runner-version-pin.test.sh
          - tests/runnerctl-doctor-host.test.sh
          - tests/runnerctl-permissions.test.sh
          - tests/runnerctl-status-contract.test.sh
          - tests/workflow-actions-contract.test.sh
    name: regression ${{ matrix.test_file }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Run regression test
        shell: bash
        run: bash "${{ matrix.test_file }}"

  normalize-executable-modes:
    if: github.event_name == 'push' && github.ref_name == 'main' && github.actor != 'github-actions[bot]'
    needs: regression-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          show-progress: false

      - name: Mark command scripts executable in Git
        shell: bash
        run: |
          set -Eeuo pipefail

          files=(runnerctl runner/create runner/start-instance)
          while IFS= read -r file; do
            files+=("$file")
          done < <(find scripts -type f -name '*.sh' -print | sort)

          for file in "${files[@]}"; do
            if [[ -f "$file" ]]; then
              git update-index --chmod=+x "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "Executable modes are already normalized."
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "chore: normalize script executable modes"
          git push origin "HEAD:${GITHUB_REF_NAME}"

name: Validate and Normalize Manager

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - runnerctl
      - runner/**
      - scripts/**
      - tests/**
      - docs/**
      - Makefile
      - compose.yaml
      - .github/workflows/normalize-script-modes.yml
  push:
    branches:
      - main
    paths:
      - runnerctl
      - runner/**
      - scripts/**
      - tests/**
      - docs/**
      - Makefile
      - compose.yaml
      - .github/workflows/normalize-script-modes.yml

permissions:
  contents: write

jobs:
  validate-and-normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2, verified from the PR run action resolution.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Validate shell syntax and command interface
        shell: bash
        run: |
          set -Eeuo pipefail

          bash -n runnerctl
          bash runnerctl help >/dev/null
          make help >/dev/null

          while IFS= read -r file; do
            echo "syntax: ${file}"
            bash -n "$file"
          done < <(find scripts tests -type f -name '*.sh' -print | sort)

          for file in runner/create runner/start-instance; do
            if [[ -f "$file" ]]; then
              echo "syntax: ${file}"
              bash -n "$file"
            fi
          done

      - name: Run manager regression tests
        shell: bash
        run: |
          set -Eeuo pipefail
          while IFS= read -r file; do
            echo "test: ${file}"
            bash "$file"
          done < <(find tests -type f -name '*.test.sh' -print | sort)

      - name: Mark command scripts executable in Git
        if: github.event_name == 'push' && github.ref_name == 'main'
        shell: bash
        run: |
          set -Eeuo pipefail

          files=(runnerctl runner/create runner/start-instance)
          while IFS= read -r file; do
            files+=("$file")
          done < <(find scripts -type f -name '*.sh' -print | sort)

          for file in "${files[@]}"; do
            if [[ -f "$file" ]]; then
              git update-index --chmod=+x "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "Executable modes are already normalized."
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "chore: normalize script executable modes"
          git push origin "HEAD:${GITHUB_REF_NAME}"

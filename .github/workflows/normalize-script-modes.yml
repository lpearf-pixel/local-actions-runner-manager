name: Validate and Normalize Manager

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - runnerctl
      - runner/**
      - scripts/**
      - Makefile
      - compose.yaml
      - .github/workflows/normalize-script-modes.yml

permissions:
  contents: write

jobs:
  validate-and-normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate shell syntax and command interface
        shell: bash
        run: |
          set -Eeuo pipefail

          bash -n runnerctl
          bash runnerctl help >/dev/null
          make help >/dev/null

          while IFS= read -r file; do
            bash -n "$file"
          done < <(find scripts -type f -name '*.sh' -print | sort)

          for file in runner/create runner/start-instance; do
            if [[ -f "$file" ]]; then
              bash -n "$file"
            fi
          done

      - name: Mark command scripts executable in Git
        shell: bash
        run: |
          set -Eeuo pipefail

          files=(runnerctl runner/create runner/start-instance)
          while IFS= read -r file; do
            files+=("$file")
          done < <(find scripts -type f -name '*.sh' -print | sort)

          for file in "${files[@]}"; do
            if [[ -f "$file" ]]; then
              git update-index --chmod=+x "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "Executable modes are already normalized."
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "chore: normalize script executable modes"
          git push origin "HEAD:${GITHUB_REF_NAME}"
